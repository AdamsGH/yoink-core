<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Yoink</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (function() {
        var valid = ['latte','frappe','macchiato','mocha'];
        var stored = localStorage.getItem('ctp-flavor');
        var flavor = valid.includes(stored) ? stored : 'macchiato';
        document.documentElement.setAttribute('data-theme', flavor);
        if (flavor !== 'latte') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
