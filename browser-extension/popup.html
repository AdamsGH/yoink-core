<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoink Cookie Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
    }

    .header {
      background: #181825;
      padding: 12px 16px;
      border-bottom: 1px solid #313244;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-icon { font-size: 20px; }
    .header-title { font-size: 15px; font-weight: 600; color: #cba6f7; }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #313244;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6c7086;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 7px 10px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #cba6f7; }
    input.mono { font-family: monospace; font-size: 11px; }

    .token-row { display: flex; gap: 6px; }
    .token-row input { flex: 1; }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:not(:disabled):hover { opacity: 0.85; }

    .btn-primary  { background: #cba6f7; color: #1e1e2e; }
    .btn-secondary { background: #45475a; color: #cdd6f4; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }
    .btn-full { width: 100%; }

    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 10px;
      display: none;
      line-height: 1.4;
    }
    .status.show { display: block; }
    .status.success { background: #a6e3a1; color: #1e1e2e; }
    .status.error   { background: #f38ba8; color: #1e1e2e; }
    .status.info    { background: #313244; color: #cdd6f4; }

    .domains-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .domain-chip {
      display: flex; align-items: center; gap: 4px;
      background: #313244; border: 1px solid #45475a;
      border-radius: 4px; padding: 3px 8px; font-size: 12px;
    }
    .domain-chip .remove { cursor: pointer; color: #f38ba8; font-size: 14px; line-height: 1; }

    .add-domain-row { display: flex; gap: 6px; margin-top: 8px; }
    .add-domain-row input { flex: 1; }

    .footer { padding: 10px 16px; display: flex; gap: 8px; }

    .hint { font-size: 11px; color: #6c7086; margin-top: 5px; line-height: 1.4; }

    .step {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 11px; color: #6c7086; line-height: 1.5;
    }
    .step-num {
      min-width: 18px; height: 18px;
      background: #313244; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #cba6f7; margin-top: 1px;
    }

    .current-site { font-family: monospace; font-size: 12px; color: #89b4fa; }

    .badge {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      font-size: 10px; font-weight: 600;
      background: #a6e3a1; color: #1e1e2e;
    }
    .badge.expired { background: #f38ba8; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">🎯</span>
    <span class="header-title">Yoink Cookie Sync</span>
  </div>

  <div class="section">
    <label>Bot URL</label>
    <input type="url" id="bot-url" placeholder="https://your-yoink-instance.example.com">
  </div>

  <div class="section">
    <label>Step 1 — Get a token from the bot</label>
    <div class="step" style="margin-bottom: 8px;">
      <span class="step-num">1</span>
      <span>Send <code style="background:#313244;padding:1px 4px;border-radius:3px;">/cookie token</code> to your Yoink bot in Telegram</span>
    </div>
    <div class="step">
      <span class="step-num">2</span>
      <span>Paste the token below and click <b>Send Cookies</b></span>
    </div>

    <div style="margin-top: 10px;">
      <label>Token</label>
      <div class="token-row">
        <input class="mono" type="text" id="token" placeholder="Paste token here…">
        <button class="btn-secondary btn-sm" id="btn-clear-token">✕</button>
      </div>
      <p class="hint" id="token-hint"></p>
    </div>
  </div>

  <div class="section">
    <label>Step 2 — Domains to sync</label>
    <div id="current-site-row" style="margin-bottom: 6px; display: none;">
      <span class="hint">Current page: </span>
      <span class="current-site" id="current-site"></span>
    </div>
    <div id="domains-list" class="domains-list"></div>
    <div class="add-domain-row">
      <input type="text" id="new-domain" placeholder="e.g. tiktok.com">
      <button class="btn-secondary btn-sm" id="btn-add-domain">Add</button>
      <button class="btn-secondary btn-sm" id="btn-add-current" title="Add current page's domain">+Page</button>
    </div>
    <p class="hint">Make sure you're logged in on these sites before sending.</p>
  </div>

  <div class="footer">
    <button class="btn-primary btn-full" id="btn-sync" disabled>Send Cookies</button>
  </div>

  <div style="padding: 0 16px 12px;">
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
