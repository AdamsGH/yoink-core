worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 512m;
    client_body_timeout 300s;

    map $request_uri $loggable {
        ~^/api/v1/health$ 0;
        default 1;
    }
    access_log /var/log/nginx/access.log combined if=$loggable;

    upstream yoink_api {
        server yoink:8000;
        keepalive 32;
    }

    upstream yoink_frontend {
        server yoink-frontend:80;
        keepalive 16;
    }

    server {
        listen 8081;

        resolver 127.0.0.11 valid=10s ipv6=off;

        # Backend health check (no /api/ prefix on backend side)
        location = /health {
            proxy_pass http://yoink_api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # API - proxy to backend
        location /api/ {
            proxy_pass http://yoink_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 600s;
            proxy_send_timeout 300s;
            proxy_request_buffering off;

            proxy_intercept_errors on;
            error_page 502 503 504 @api_unavailable;
        }

        # Scalar API docs - served as inline HTML pointing at /api/openapi.json
        location = /scalar {
            return 301 /scalar/;
        }

        location /scalar/ {
            default_type text/html;
            return 200 '<!doctype html>
<html>
<head>
  <title>Yoink API</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
</head>
<body>
  <script id="api-reference" data-url="/api/openapi.json"></script>
  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
</body>
</html>';
        }

        # Frontend - proxy to yoink-frontend container
        location / {
            proxy_pass http://yoink_frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_intercept_errors on;
            error_page 502 503 504 @frontend_unavailable;
        }

        location @api_unavailable {
            default_type application/json;
            return 503 '{"detail":"API is temporarily unavailable. Please try again shortly."}';
        }

        location @frontend_unavailable {
            default_type text/html;
            return 503 '<!doctype html><html><head><meta charset="utf-8"/><title>Yoink</title>
<style>body{font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#0f0f0f;color:#fff}
.box{text-align:center;padding:2rem}.emoji{font-size:3rem}h1{margin:.5rem 0}p{color:#888}</style>
</head><body><div class="box"><div class="emoji">🔄</div><h1>Starting up</h1>
<p>Frontend is restarting, please wait a moment.</p></div></body></html>';
        }
    }
}
