worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 512m;
    client_body_timeout 300s;

    map $request_uri $loggable {
        ~^/api/v1/health$ 0;
        default 1;
    }
    access_log /var/log/nginx/access.log combined if=$loggable;

    server {
        listen 8081;

        # Docker embedded DNS — re-resolve on every request so container
        # restarts (new IPs) are picked up without restarting nginx.
        resolver 127.0.0.11 valid=10s ipv6=off;

        set $backend  yoink:8000;
        set $frontend yoink-frontend:80;

        location = /health {
            proxy_pass http://$backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        location = /openapi.json {
            proxy_pass http://$backend/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location = /docs {
            proxy_pass http://$backend/docs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        location /api/ {
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 600s;
            proxy_send_timeout 300s;
            proxy_request_buffering off;

            proxy_intercept_errors on;
            error_page 502 503 504 @api_unavailable;
        }

        location / {
            proxy_pass http://$frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
            error_page 502 503 504 @frontend_unavailable;
        }

        location @spa_fallback {
            rewrite ^ /index.html break;
            proxy_pass http://$frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        location @api_unavailable {
            default_type application/json;
            return 503 '{"detail":"API is temporarily unavailable. Please try again shortly."}';
        }

        location @frontend_unavailable {
            default_type text/html;
            return 503 '<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoink — Starting up</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0f;
      color: #e2e2e5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 40px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 20px;
      display: block;
      animation: spin 2s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 10px; }
    p { color: #71717a; line-height: 1.6; font-size: 0.95rem; }
    .hint {
      margin-top: 24px;
      padding: 12px 16px;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 8px;
      font-family: "Menlo", "Monaco", "Consolas", monospace;
      font-size: 0.8rem;
      color: #a1a1aa;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">⟳</span>
    <h1>Frontend is restarting</h1>
    <p>The app is starting up. This usually takes a few seconds — refresh in a moment.</p>
    <div class="hint">just up yoink-frontend</div>
  </div>
  <script>setTimeout(() => location.reload(), 4000);</script>
</body>
</html>';
        }
    }
}
